name: Deploy noaa
permissions:
  packages: write

on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push noaa image
        uses: docker/build-push-action@v6
        with:
          context: ./ecs/noaa
          push: true
          tags: ghcr.io/tim-christy/noaa:latest

      - name: Deploy to Pi
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: tim
          key: ${{ secrets.RPI }}
          script: docker pull ghcr.io/tim-christy/noaa:latest

